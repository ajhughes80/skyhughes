name: CI - Non-Production

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # Optional: deploy to non-prod S3 for preview testing
  deploy-non-prod:
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.NONPROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.NONPROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to non-prod S3
        run: aws s3 sync dist/ s3://${{ secrets.NONPROD_S3_BUCKET_NAME }} --delete

      - name: Invalidate non-prod CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.NONPROD_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
